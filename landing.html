<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAKSHAK OS | UPLINK</title>
    <meta name="description" content="RAKSHAK OS — AI-powered Smart Helmet Tactical System">
    <meta name="theme-color" content="#007080">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="RAKSHAK OS">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.svg">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --accent-cyan: #007080;
            --accent-red: #d90033;
            --bg-deep: #f0f4f8;
            --text-main: #0a111a;
            --glass-border: rgba(0, 112, 128, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Share Tech Mono', monospace;
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .background-fx {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background:
                radial-gradient(circle at 50% 50%, rgba(0, 112, 128, 0.05) 0%, transparent 70%),
                repeating-linear-gradient(0deg, rgba(0, 0, 0, 0.02) 1px, transparent 2px);
            background-size: 100% 100%, 100% 4px;
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            width: 100%;
            max-width: 600px;
            padding: 40px;
        }

        .os-logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 3.5rem;
            letter-spacing: 15px;
            color: var(--accent-cyan);
            margin-bottom: 20px;
            text-shadow: 2px 2px 0px rgba(0, 0, 0, 0.05);
            animation: flicker 4s infinite;
        }

        .tagline {
            font-size: 0.8rem;
            letter-spacing: 5px;
            color: rgba(10, 17, 26, 0.6);
            margin-bottom: 60px;
            text-transform: uppercase;
        }

        .boot-btn {
            background: transparent;
            border: 2px solid var(--accent-cyan);
            color: var(--accent-cyan);
            padding: 20px 50px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            letter-spacing: 5px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%);
            font-weight: bold;
        }

        .boot-btn:hover {
            background: var(--accent-cyan);
            color: white;
            box-shadow: 0 10px 30px rgba(0, 112, 128, 0.2);
            transform: scale(1.05);
        }

        .boot-btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: 0.5s;
        }

        .boot-btn:hover::after {
            left: 100%;
        }

        .status-grid {
            margin-top: 60px;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
            font-size: 0.7rem;
            opacity: 0.6;
            color: var(--accent-cyan);
        }

        .status-item {
            border-top: 1px solid var(--glass-border);
            padding-top: 10px;
        }

        @keyframes flicker {

            0%,
            100% {
                opacity: 1;
            }

            92% {
                opacity: 1;
            }

            93% {
                opacity: 0.8;
            }

            94% {
                opacity: 1;
            }

            95% {
                opacity: 0.9;
            }

            96% {
                opacity: 1;
            }
        }

        .scanline {
            width: 100%;
            height: 100px;
            background: linear-gradient(0deg, transparent, rgba(0, 112, 128, 0.03), transparent);
            position: absolute;
            top: -100px;
            left: 0;
            animation: scanlineMove 8s infinite linear;
            pointer-events: none;
        }

        @keyframes scanlineMove {
            0% {
                top: -100px;
            }

            100% {
                top: 100vh;
            }
        }

        .overlay-text {
            position: fixed;
            bottom: 20px;
            left: 20px;
            font-size: 0.6rem;
            color: rgba(10, 17, 26, 0.3);
            text-transform: uppercase;
        }
    </style>
</head>

<body>
    <div class="background-fx"></div>
    <div class="scanline"></div>

    <div class="container">
        <h1 class="os-logo">RAKSHAK</h1>
        <p class="tagline">Neural Mesh Tactical OS v4.5.1</p>

        <button class="boot-btn" onclick="startBoot()">START BOOT SEQUENCE</button>

        <div class="status-grid">
            <div class="status-item">CORE: OPTIMAL</div>
            <div class="status-item">NET: 0x4F2A</div>
            <div class="status-item">SYNC: READY</div>
        </div>
    </div>

    <div class="overlay-text">UPLINK_STATUS: STANDBY | NODE_7G</div>

    <script>
        function startBoot() {
            const btn = document.querySelector('.boot-btn');
            btn.innerText = "INITIALIZING...";
            btn.disabled = true;

            // Add cinematic sound or vibration effect simulation
            document.body.style.animation = "shake 0.5s";

            setTimeout(() => {
                window.location.href = 'rakshak.html';
            }, 1500);
        }
    </script>

    <!-- PWA Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log('[RAKSHAK] Service Worker registered:', reg.scope))
                .catch(err => console.error('[RAKSHAK] SW registration failed:', err));
        }
    </script>
</body>

</html>
